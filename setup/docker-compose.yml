
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fileshare_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
    - "5432:5432"
    # (Optional) healthcheck to ensure DB is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user"]
      interval: 5s 
      timeout: 2s
      retries: 5

  auth:
    build:
      context: ./src/svc/auth
      dockerfile: Dockerfile
    ports:
    - "5001:80"
    environment:
      # Connection string for Auth DB (sentinel example):
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=auth_db;Username=fileshare_user;Password=password
    # (See **Auth JWT config** below)
    depends_on:
    - db


  lock:
    build:
      context: ./src/svc/lock
      dockerfile: Dockerfile
    ports:
    - "5002:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=lock_db;Username=fileshare_user;Password=password
      - Authentication__Jwt__Issuer=http://localhost:5001
      - Authentication__Jwt__Audience=fileshare
    depends_on:
      - db
      - auth

volumes:
  postgres_data: