# Internal services: three Kestrel listeners (HTTP + HTTPS + mTLS)
x-kestrel-endpoints: &kestrel-endpoints
  ASPNETCORE_ENVIRONMENT: Development
  Kestrel__Endpoints__Http__Url: "http://+:8080"
  Kestrel__Endpoints__Https__Url: "https://+:8443"
  Kestrel__Endpoints__Https__Certificate__Path: /https/fileshare-dev.pfx
  Kestrel__Endpoints__Https__Certificate__Password: ${DEV_CERT_PASSWORD}
  Kestrel__Endpoints__Mtls__Url: "https://+:9443"
  Kestrel__Endpoints__Mtls__Certificate__Path: /https/fileshare-dev.pfx
  Kestrel__Endpoints__Mtls__Certificate__Password: ${DEV_CERT_PASSWORD}
  Kestrel__Endpoints__Mtls__ClientCertificateMode: RequireCertificate

# Client cert used for outgoing internal mTLS calls (enabled by INTERNAL_SERVICE_USE_MTLS)
x-mtls-client: &mtls-client
  Mtls__Enabled: "${INTERNAL_SERVICE_USE_MTLS:-false}"
  Mtls__ClientCertPath: /https/fileshare-client.pfx
  DEV_CERT_PASSWORD: ${DEV_CERT_PASSWORD}

x-https-mount: &https-mount ./.dev-certs/pfx:/https:ro

x-ca-build: &ca-build
  additional_contexts:
    ca: ./.dev-certs/ca
    shared: ./src/shared

services:
  #---------------------------------------------------------------
  # API Gateway - Yarp
  #---------------------------------------------------------------
  api-gateway:
    build:
      context: ./src/svc/api-gateway-yarp
      dockerfile: Dockerfile
      <<: *ca-build
    ports:
      - "8088:8080" # HTTP  host:container
      - "8089:8443" # HTTPS host:container
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/fileshare-dev.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${DEV_CERT_PASSWORD}
      <<: *mtls-client
      ReverseProxy__Clusters__auth__Destinations__auth-1__Address: "${INTERNAL_SERVICE_SCHEME}://auth:${INTERNAL_SERVICE_PORT}/"
      ReverseProxy__Clusters__storage__Destinations__storage-1__Address: "${INTERNAL_SERVICE_SCHEME}://storage:${INTERNAL_SERVICE_PORT}/"
      ReverseProxy__Clusters__lock__Destinations__lock-1__Address: "${INTERNAL_SERVICE_SCHEME}://lock:${INTERNAL_SERVICE_PORT}/"
      ReverseProxy__Clusters__wopi-host__Destinations__wopi-host-1__Address: "${INTERNAL_SERVICE_SCHEME}://wopi-host:${INTERNAL_SERVICE_PORT}/"
    volumes:
      - *https-mount
    depends_on:
      - auth
      - storage
      - lock
      - wopi-host

  #---------------------------------------------------------------
  # Auth Service
  #---------------------------------------------------------------
  auth-db:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user -d auth_db"]
      interval: 5s
      timeout: 2s
      retries: 5

  auth:
    volumes:
      - ./kid1.pem:/run/secrets/auth-jwt-key:ro
      - *https-mount
    build:
      context: ./src/svc/auth
      dockerfile: Dockerfile
      <<: *ca-build
    ports:
      - "5039:8080" # HTTP
      - "5040:8443" # HTTPS
      - "5041:9443" # mTLS
    environment:
      <<: *kestrel-endpoints
      ConnectionStrings__DefaultConnection: "Host=auth-db;Port=5432;Database=auth_db;Username=fileshare_user;Password=password"
      Authentication__Jwt__Issuer: "${INTERNAL_SERVICE_SCHEME}://auth:${INTERNAL_SERVICE_PORT}"
      Authentication__Jwt__Audience: "fileshare"
      Authentication__Jwt__LatestKeyId: "kid-1"
      Authentication__Jwt__ExpiresMinutes: "60"
      Authentication__Jwt__SigningKeys__0__KeyId: "kid-1"
      SwaggerGatewayPrefix: /auth
    depends_on:
      - auth-db

  #---------------------------------------------------------------
  # Storage Service
  #---------------------------------------------------------------
  storage-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - storage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user -d storage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage:
    build:
      context: ./src/svc/storage
      dockerfile: Dockerfile
      <<: *ca-build
    ports:
      - "5134:8080" # HTTP
      - "5135:8443" # HTTPS
      - "5136:9443" # mTLS
    environment:
      <<: [*kestrel-endpoints, *mtls-client]
      ConnectionStrings__DefaultConnection: "Host=storage-db;Port=5432;Database=storage_db;Username=fileshare_user;Password=password"
      Authentication__Jwt__Issuer: "${INTERNAL_SERVICE_SCHEME}://auth:${INTERNAL_SERVICE_PORT}"
      Authentication__Jwt__Audience: "fileshare"
      SwaggerGatewayPrefix: /storage
      OpenFga__BaseUrl: "http://openfga:8080"
      OpenFga__StoreId: "${OPENFGA_STORE_ID}"
      OpenFga__AuthorizationModelId: "${OPENFGA_MODEL_ID}"
    volumes:
      - *https-mount
    depends_on:
      - storage-db
      - auth
      - openfga

  #---------------------------------------------------------------
  # Lock Service
  #---------------------------------------------------------------
  lock-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lock_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - lock_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user -d lock_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  lock:
    build:
      context: ./src/svc/lock
      dockerfile: Dockerfile
      <<: *ca-build
    ports:
      - "5038:8080" # HTTP
      - "5037:8443" # HTTPS
      - "5036:9443" # mTLS
    environment:
      <<: [*kestrel-endpoints, *mtls-client]
      ConnectionStrings__DefaultConnection: "Host=lock-db;Port=5432;Database=lock_db;Username=fileshare_user;Password=password"
      Authentication__Jwt__Issuer: "${INTERNAL_SERVICE_SCHEME}://auth:${INTERNAL_SERVICE_PORT}"
      Authentication__Jwt__Audience: "fileshare"
      SwaggerGatewayPrefix: /lock
    volumes:
      - *https-mount
    depends_on:
      - lock-db
      - auth

  #---------------------------------------------------------------
  # WOPI Host
  #---------------------------------------------------------------
  wopi-host:
    build:
      context: ./src/svc/wopi-host
      dockerfile: Dockerfile
      <<: *ca-build
    ports:
      - "5018:8080" # HTTP
      - "5019:8443" # HTTPS
      - "5020:9443" # mTLS
    environment:
      <<: [*kestrel-endpoints, *mtls-client]
      Authentication__Jwt__Issuer: "${INTERNAL_SERVICE_SCHEME}://auth:${INTERNAL_SERVICE_PORT}"
      Authentication__Jwt__Audience: "fileshare"
      Services__Storage__BaseUrl: "${INTERNAL_SERVICE_SCHEME}://storage:${INTERNAL_SERVICE_PORT}"
      Services__LockManager__BaseUrl: "${INTERNAL_SERVICE_SCHEME}://lock:${INTERNAL_SERVICE_PORT}"
      SwaggerGatewayPrefix: /wopi
      OpenFga__BaseUrl: "http://openfga:8080"
      OpenFga__StoreId: "${OPENFGA_STORE_ID}"
      OpenFga__AuthorizationModelId: "${OPENFGA_MODEL_ID}"
    volumes:
      - *https-mount
    depends_on:
      - auth
      - storage
      - lock
      - openfga
  
  #---------------------------------------------------------------
  # OpenFGA
  #---------------------------------------------------------------
  openfga-db:
    image: postgres:17
    environment:
      POSTGRES_DB: openfga
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - openfga_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openfga"]
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable
    depends_on:
      openfga-db:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable
      OPENFGA_AUTHN_METHOD: none
      OPENFGA_PLAYGROUND_ENABLED: "true"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3000:3000"

volumes:
  auth_data:
  lock_data:
  storage_data:
  openfga_data:
