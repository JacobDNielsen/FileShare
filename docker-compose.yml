version: "3.9"
services:
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - auth_data:/var/lib/postgresql/data

    #ports:
    #- "5432:5432"
    # (Optional) healthcheck to ensure DB is ready
    #healthcheck:
    #  test: ["CMD-SHELL", "pg_isready -U fileshare_user -d fileshare_db"]
    #  interval: 5s 
    #  timeout: 2s
    #  retries: 5

  auth:
    volumes:
    - ./kid1.pem:/run/secrets/auth-jwt-key:ro
    build:
      context: ./src/svc/auth
      dockerfile: Dockerfile
    ports:
    - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Connection string for Auth DB (sentinel example):
      - ConnectionStrings__DefaultConnection=Host=auth-db;Port=5432;Database=auth_db;Username=fileshare_user;Password=password
    # (See **Auth JWT config** below)
      - Authentication__Jwt__Issuer=http://localhost:5001
      - Authentication__Jwt__Audience=fileshare
      - Authentication__Jwt__LatestKeyId=key1
      - Authentication__Jwt__ExpiresMinutes=60
      - Authentication__Jwt__SigningKeys__0__KeyId=key1

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    depends_on:
    - auth-db


  lock-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lock_db
      POSTGRES_USER: fileshare_user
      POSTGRES_PASSWORD: password
    volumes:
      - lock_data:/var/lib/postgresql/data


  lock:
    build:
      context: ./src/svc/lock
      dockerfile: Dockerfile
    ports:
    - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=lock-db;Port=5432;Database=lock_db;Username=fileshare_user;Password=password
      - Authentication__Jwt__Issuer=http://localhost:5001
      - Authentication__Jwt__Audience=fileshare

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare_user -d lock_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    depends_on:
      - lock-db
      - auth

volumes:
  auth_data:
  lock_data: