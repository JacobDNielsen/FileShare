# docker-compose.mtls.yml
# Activates mTLS for internal service-to-service traffic.
# Usage: docker compose -f docker-compose.yml -f docker-compose.mtls.yml up --build

x-kestrel-mtls: &kestrel-mtls
  Kestrel__Endpoints__Http__Url: "http://+:8080"
  Kestrel__Endpoints__Https__Url: "https://+:8443"
  Kestrel__Endpoints__Https__Certificate__Path: /https/fileshare-dev.pfx
  Kestrel__Endpoints__Https__Certificate__Password: ${HTTPS_CERT_PASSWORD}
  Kestrel__Endpoints__Mtls__Url: "https://+:9443"
  Kestrel__Endpoints__Mtls__ClientCertificateMode: "RequireCertificate"
  Kestrel__Endpoints__Mtls__Certificate__Path: /https/fileshare-dev.pfx
  Kestrel__Endpoints__Mtls__Certificate__Password: ${HTTPS_CERT_PASSWORD}

x-mtls-client: &mtls-client
  Mtls__Enabled: "true"
  Mtls__ClientCertPath: /https/fileshare-client.pfx
  Mtls__ClientCertPassword: ${HTTPS_CERT_PASSWORD}

services:
  api-gateway:
    environment:
      <<: *mtls-client
      ReverseProxy__Clusters__auth__Destinations__auth-1__Address: "https://auth:9443/"
      ReverseProxy__Clusters__storage__Destinations__storage-1__Address: "https://storage:9443/"
      ReverseProxy__Clusters__lock__Destinations__lock-1__Address: "https://lock:9443/"
      ReverseProxy__Clusters__wopi-host__Destinations__wopi-host-1__Address: "https://wopi-host:9443/"

  auth:
    environment:
      <<: *kestrel-mtls
      Authentication__Jwt__Issuer: "https://auth:9443"

  storage:
    environment:
      <<: *kestrel-mtls
      <<: *mtls-client
      Authentication__Jwt__Issuer: "https://auth:9443"

  lock:
    environment:
      <<: *kestrel-mtls
      <<: *mtls-client
      Authentication__Jwt__Issuer: "https://auth:9443"

  wopi-host:
    environment:
      <<: *kestrel-mtls
      <<: *mtls-client
      Authentication__Jwt__Issuer: "https://auth:9443"
      Services__Storage__BaseUrl: "https://storage:9443"
      Services__LockManager__BaseUrl: "https://lock:9443"
